# WAhubX 本地开发依赖
# 启动: docker compose -f docker-compose.dev.yml up -d
# 停止: docker compose -f docker-compose.dev.yml down
# 清库: docker compose -f docker-compose.dev.yml down -v
#
# 注意: 生产环境用租户本机原生服务, 不用 Docker (详见 WAhubX_技术交接文档 § 9)

services:
  postgres:
    image: postgres:16-alpine
    container_name: wahubx-dev-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: wahubx
      POSTGRES_USER: wahubx
      POSTGRES_PASSWORD: wahubx
      TZ: Asia/Kuala_Lumpur
      PGTZ: Asia/Kuala_Lumpur
    # 主机端口 5434 (避开 FAhubX 占用的 5433 · 原 WAhubX 5433 已让渡)
    ports:
      - '5434:5432'
    volumes:
      - wahubx-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wahubx -d wahubx']
      interval: 5s
      timeout: 3s
      retries: 10

  # M3 任务调度: BullMQ 需要 Redis 作为队列后端
  redis:
    image: redis:7-alpine
    container_name: wahubx-dev-redis
    restart: unless-stopped
    # 主机端口 6381 (避开 FAhubX 占用的 6380 · 原 WAhubX 6380 已让渡)
    ports:
      - '6381:6379'
    volumes:
      - wahubx-redis-data:/data
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1000']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  wahubx-pg-data:
    name: wahubx-dev-pg-data
  wahubx-redis-data:
    name: wahubx-dev-redis-data

# WAhubX Redis 最小配置 (本地 cache · 非主存储)
#
# 核心: 绑 localhost + 禁持久化 (BullMQ 装了但 M3-M11 都没真用, 当前 cache-only)
# 若 V1.1 启 BullMQ 真用 Redis 持久化 · 改这里 + appendonly yes

bind 127.0.0.1 ::1
protected-mode yes
tcp-keepalive 60
timeout 300

# 禁持久化 · Redis 重启从零 · 无 keyspace 持久层
save ""
appendonly no

# 日志
loglevel notice
# logfile 由 start.bat 用 --dir + 重定向 · 这里不写死

# 内存上限 · 本地 cache 用 64MB 足够
maxmemory 64mb
maxmemory-policy allkeys-lru

# 客户端限制
maxclients 20

# 安全 (本地单机 · 不启 auth)
# requirepass 留空 · 若 V1.1 对外开可加
